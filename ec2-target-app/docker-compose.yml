version: '3.8'

services:
  dummy-app:
    build: ./dummy-app
    ports:
      - "8080:8080"
    volumes:
      - ./target-logs:/app/logs

  node-exporter:
    image: prom/node-exporter:latest
    ports:
      - "9100:9100"

  promtail:
    image: grafana/promtail:latest
    volumes:
      - ./target-logs:/var/log/app-logs:ro
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - dummy-app
