version: '3.8'

services:
  dummy-app:
    build: ./dummy-app
    ports:
      - "8080:8080"
    volumes:
      - ./target-logs:/app/logs

  alloy:
    image: grafana/alloy:latest
    volumes:
      - ./target-logs:/var/log/app-logs:ro
      - ./config.alloy:/etc/alloy/config.alloy
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
    env_file:
      - .env
    ports:
      - "12345:12345"
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    pid: host
    depends_on:
      - dummy-app
