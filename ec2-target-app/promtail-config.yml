server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  # IP OF YOUR OBSERVABILITY EC2
  - url: http://3.92.226.150:3100/loki/api/v1/push

scrape_configs:
  - job_name: 'system'
    static_configs:
      - targets:
          - localhost
        labels:
          job: 'system_logs'
          __path__: /var/log/*.log
  - job_name: 'app'
    static_configs:
      - targets:
          - localhost
        labels:
          job: 'app_logs'
          __path__: /var/log/app-logs/*.log

