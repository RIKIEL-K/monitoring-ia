apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: kubeflow
spec:
  template:
    spec:
      containers:
      - name: mysql
        image: mysql:8.0.36

        args:
        - --default-authentication-plugin=mysql_native_password
        - --character-set-server=utf8mb3
        - --collation-server=utf8mb3_general_ci