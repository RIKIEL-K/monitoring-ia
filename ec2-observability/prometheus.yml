global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'node_exporter'
    static_configs:
      # REPLACE WITH THE IP OF YOUR TARGET EC2 APP
      - targets: ['<IP_EC2_TARGET_APP>:9100']

  - job_name: 'dummy_web'
    static_configs:
      # REPLACE WITH THE IP OF YOUR TARGET EC2 APP
      - targets: ['<IP_EC2_TARGET_APP>:8080']
